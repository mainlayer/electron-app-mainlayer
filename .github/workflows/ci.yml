name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          MAINLAYER_API_KEY: ${{ secrets.MAINLAYER_API_KEY }}
          MAINLAYER_PREMIUM_RESOURCE_ID: ${{ secrets.MAINLAYER_PREMIUM_RESOURCE_ID }}

      - name: Build TypeScript
        run: npm run build
        env:
          MAINLAYER_API_KEY: ${{ secrets.MAINLAYER_API_KEY }}

  package:
    name: Package (macOS)
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build
        env:
          MAINLAYER_API_KEY: ${{ secrets.MAINLAYER_API_KEY }}

      - name: Package app
        run: npm run pack
        env:
          MAINLAYER_API_KEY: ${{ secrets.MAINLAYER_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-mac
          path: dist/
